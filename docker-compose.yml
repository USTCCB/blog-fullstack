version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: docker.m.daocloud.io/nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - blog-network

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - blog-network

  # Nest.js 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/blog?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
      - PORT=4000
    expose:
      - "4000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - blog-network

  # PostgreSQL 数据库
  postgres:
    image: docker.m.daocloud.io/postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - blog-network

  # Redis 缓存
  redis:
    image: docker.m.daocloud.io/redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
